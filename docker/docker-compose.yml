services:
  mongodb:
    image: mongo:7
    container_name: bdi-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:5
    container_name: bdi-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bdi-api
    ports:
      - "8080:8080"
    environment:
      BDI_NEO4J_URL: bolt://neo4j:7687
      BDI_NEO4J_USER: neo4j
      BDI_NEO4J_PASSWORD: password123
    depends_on:
      - neo4j
      - mongodb

volumes:
  mongodb_data:
  neo4j_data: